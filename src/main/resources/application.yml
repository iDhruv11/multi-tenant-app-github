spring:
  application:
    name: saas-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saas_db}
    username: ${SPRING_DATASOURCE_USERNAME:saas_user}
    password: ${SPRING_DATASOURCE_PASSWORD:secure_password}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secure-secret-key-at-least-256-bits-long}
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7
