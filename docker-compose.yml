
services:
  spring-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xss256k -XX:MaxRAMPercentage=60.0
    deploy:
      resources:
        limits:
          memory: 1200M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: saas_db
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: secure_password
    command: postgres -c shared_buffers=32MB -c max_connections=20 -c work_mem=2MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d saas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
